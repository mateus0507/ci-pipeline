# Nome da pipeline que aparecerá no GitHub Actions
name: CI Pipeline


# Define quando a pipeline será executada
on:

  # Executa quando um Pull Request é aberto para a main
  pull_request:
    branches: [main]

  # Executa quando algo é enviado diretamente para a main
  push:
    branches: [main]


# Define os jobs (etapas da pipeline)
jobs:


  # =============================
  # JOB 1 - VALIDAÇÃO DE CÓDIGO
  # =============================
  lint:

    # Nome exibido no GitHub
    name: Code validation (lint)

    # Sistema operacional usado pelo runner
    runs-on: ubuntu-latest

    steps:

      # Baixa o código do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # Instala Python na máquina do runner
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instala dependências do projeto
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Executa análise de qualidade do código
      - name: Run lint
        run: |
          ruff check .


  # =============================
  # JOB 2 - TESTES AUTOMATIZADOS
  # =============================
  test:

    # Nome do job
    name: Run tests

    # Esse job só roda se o lint passar
    needs: [lint]

    # Runner usado
    runs-on: ubuntu-latest

    steps:

      # Baixa o código novamente
      - uses: actions/checkout@v4

      # Instala Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Define o diretório atual como PYTHONPATH
      # Isso permite importar o app.py nos testes
      - name: Run pytest
        env:
          PYTHONPATH: .
        run: |
          pytest


  # =============================
  # JOB 3 - BUILD DO PROJETO
  # =============================
  build:

    # Nome do job
    name: Build project

    # Só executa se os testes passarem
    needs: [test]

    # Runner usado
    runs-on: ubuntu-latest

    steps:

      # Baixa o código
      - uses: actions/checkout@v4

      # Instala Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instala dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Executa o build do projeto
      - name: Build package
        run: |
          python -m build

      # Salva o build como artefato do GitHub
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
        
  # =============================
  # JOB 4 - DEPLOY (CD)
  # =============================
  deploy:
    name: Deploy application

    # Só roda se o build passar
    needs: [build]

    runs-on: ubuntu-latest

    # Só executa deploy quando o evento for push na branch main
    # (ou seja: depois do merge na main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Baixa o código do repositório no runner
      - uses: actions/checkout@v4

      # Deploy "simulado" (sem servidor real), só pra provar o CD
      - name: Deploy
        run: |
          echo "Iniciando deploy..."
          echo "Deploy concluído com sucesso na branch main!"